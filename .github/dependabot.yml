version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # TypeScript / pnpm workspace
  # versioning-strategy: lockfile-only keeps pnpm-lock.yaml consistent;
  # without it Dependabot bumps package.json without regenerating the lockfile.
  - package-ecosystem: npm
    directory: /packages/llm-test-harness
    schedule:
      interval: weekly
    versioning-strategy: lockfile-only
    groups:
      typescript-deps:
        patterns: ["*"]

  # Python
  - package-ecosystem: pip
    directory: /packages/llm-test-harness-python
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]
