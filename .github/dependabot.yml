version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # TypeScript / npm (pnpm workspace)
  - package-ecosystem: npm
    directory: /packages/llm-test-harness
    schedule:
      interval: weekly
    groups:
      typescript-deps:
        patterns: ["*"]

  # Python
  - package-ecosystem: pip
    directory: /packages/llm-test-harness-python
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]
