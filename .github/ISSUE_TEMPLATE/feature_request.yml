name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. Why is the current behaviour insufficient?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? API sketch or pseudocode is welcome.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - TypeScript package only
        - Python package only
        - Both packages (requires cross-language parity)
        - CI / tooling
        - Documentation
    validations:
      required: true
