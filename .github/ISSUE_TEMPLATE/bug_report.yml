name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npm list llm-test-harness` or `pip show llm-test-harness`
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - TypeScript / JavaScript
        - Python
        - Both
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: LLM provider
      options:
        - Anthropic
        - OpenAI
        - HTTP interceptor
        - Not applicable

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what is happening vs what you expected.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Smallest possible code that reproduces the issue.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      render: shell
