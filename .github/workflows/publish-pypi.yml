name: Publish to PyPI

on:
  push:
    tags:
      - "py-v*"

jobs:
  publish:
    name: Publish PyPI package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for Trusted Publishing (OIDC) — no API token needed

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build + dev deps
        working-directory: packages/llm-test-harness-python
        run: |
          pip install build hatchling
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/llm-test-harness-python
        run: pytest tests/ -v --tb=short

      - name: Type check
        working-directory: packages/llm-test-harness-python
        run: mypy llm_test_harness/

      - name: Build distributions
        working-directory: packages/llm-test-harness-python
        run: python -m build

      - name: Verify wheel contents
        working-directory: packages/llm-test-harness-python
        run: |
          pip install twine
          twine check dist/*
          python -c "
          import zipfile, sys
          wheel = next(f for f in __import__('os').listdir('dist') if f.endswith('.whl'))
          with zipfile.ZipFile(f'dist/{wheel}') as z:
              names = z.namelist()
          assert any('py.typed' in n for n in names), 'py.typed missing from wheel'
          assert any('README' in n for n in names), 'README missing from wheel'
          print('Wheel contents OK:', len(names), 'files')
          "

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: packages/llm-test-harness-python/dist/
