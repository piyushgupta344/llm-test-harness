name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # TypeScript
  # ---------------------------------------------------------------------------
  typescript:
    name: TypeScript (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: packages/llm-test-harness
        run: pnpm typecheck

      - name: Test
        working-directory: packages/llm-test-harness
        run: pnpm test

      - name: Build
        working-directory: packages/llm-test-harness
        run: pnpm build

      - name: Smoke test — pack output
        working-directory: packages/llm-test-harness
        run: |
          pnpm pack --dry-run 2>&1 | grep -E "dist/|README|LICENSE"

  # ---------------------------------------------------------------------------
  # Python
  # ---------------------------------------------------------------------------
  python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: packages/llm-test-harness-python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Type check (mypy)
        run: mypy llm_test_harness/

      - name: Build distributions
        run: |
          pip install build
          python -m build
          ls dist/
