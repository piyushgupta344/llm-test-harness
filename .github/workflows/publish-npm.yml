name: Publish to npm

on:
  push:
    tags:
      - "ts-v*"

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance attestation

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: packages/llm-test-harness
        run: pnpm typecheck

      - name: Test
        working-directory: packages/llm-test-harness
        run: pnpm test

      - name: Build
        working-directory: packages/llm-test-harness
        run: pnpm build

      - name: Verify pack contents
        working-directory: packages/llm-test-harness
        run: |
          TARBALL=$(pnpm pack --pack-destination /tmp 2>/dev/null | tail -1)
          echo "Packed: $TARBALL"
          tar ztf "$TARBALL" | tee /tmp/pack-list.txt
          grep -q "dist/" /tmp/pack-list.txt && echo "✓ dist/ present"
          grep -q "README" /tmp/pack-list.txt && echo "✓ README present"
          grep -q "LICENSE" /tmp/pack-list.txt && echo "✓ LICENSE present"

      - name: Publish
        working-directory: packages/llm-test-harness
        run: pnpm publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
